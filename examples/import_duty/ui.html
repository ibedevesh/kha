<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kha, import duty, computed exactly</title>
<style>
 :root{--ground:#F5F6F8;--surface:#fff;--raise:#FBFCFD;--text:#0F141B;--muted:#5B6672;--faint:#8A94A0;
  --line:#E4E8ED;--teal:#0E6E57;--teal-soft:#E5F1ED;--gold:#A9854E;
  --serif:"Iowan Old Style",Palatino,Georgia,serif;--sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}
 *{box-sizing:border-box}html,body{height:100%}
 body{margin:0;background:var(--ground);color:var(--text);font-family:var(--sans);line-height:1.6}
 .app{display:flex;flex-direction:column;height:100vh;max-width:820px;margin:0 auto}
 .bar{display:flex;align-items:center;justify-content:space-between;padding:15px 22px;border-bottom:1px solid var(--line);flex:none}
 .logo{display:flex;align-items:center;gap:11px}
 .mark{width:26px;height:26px;position:relative;flex:none}
 .mark::before{content:"";position:absolute;inset:0;background:var(--gold);transform:rotate(45deg);border-radius:5px}
 .mark::after{content:"";position:absolute;inset:8px;background:var(--ground);transform:rotate(45deg);border-radius:2px}
 .word{font-family:var(--serif);font-size:19px;font-weight:600}
 .pb{font-family:var(--mono);font-size:10.5px;color:var(--faint)}.pb b{color:var(--teal)}
 .nav{font-family:var(--mono);font-size:12px;color:var(--muted);text-decoration:none}.nav:hover{color:var(--teal)}
 .thread{flex:1;overflow-y:auto;padding:26px 22px 8px}
 .empty{max-width:560px;margin:7vh auto 0;text-align:center}
 .empty h1{font-family:var(--serif);font-size:29px;font-weight:600;margin:0 0 8px}
 .empty p{color:var(--muted);margin:0 0 24px}
 .starters{display:grid;gap:10px}
 .starter{text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 16px;cursor:pointer;font-size:14.5px}
 .starter:hover{border-color:var(--teal);color:var(--teal)}.starter span{display:block;font-size:12.5px;color:var(--faint);margin-top:2px}
 .msg{display:flex;gap:13px;margin:0 0 22px;align-items:flex-start}.msg.user{justify-content:flex-end}
 .msg.user .bub{background:var(--teal-soft);border-radius:16px 16px 4px 16px;padding:11px 16px;max-width:80%;font-size:15px}
 .msg.bot .av{flex:none;width:30px;height:30px;border-radius:9px;background:var(--teal);display:grid;place-items:center;color:#fff;font-weight:700;font-family:var(--serif)}
 .msg.bot .content{max-width:calc(100% - 44px);width:100%}
 .reply{font-size:15.5px;color:#26332d;white-space:pre-wrap;margin:0}
 .amtcard{margin:14px 0 0;background:linear-gradient(135deg,#F0F8F5,#E5F1ED);border:1px solid #CDE5DC;border-radius:14px;padding:16px 20px}
 .amtcard .lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);opacity:.8}
 .amtcard .amt{font-family:var(--serif);font-size:31px;font-weight:600;margin:2px 0 0}.amtcard .amt .r{color:var(--faint);font-size:.55em}
 .why{margin-top:9px;font-family:var(--mono);font-size:11.5px;color:var(--teal);background:none;border:0;cursor:pointer;padding:0;text-decoration:underline}
 .work{margin:12px 0 0;background:var(--raise);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
 .work .wl{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin:0 0 12px}
 .steps{list-style:none;margin:0;padding:0}
 .steps li{display:grid;grid-template-columns:1fr auto;gap:12px;padding:0 0 10px;font-size:13.5px}
 .steps li .h{font-family:var(--serif);font-weight:600}.steps li .d{font-size:12px;color:var(--muted)}
 .steps li .amt{font-family:var(--mono);font-variant-numeric:tabular-nums}
 .steps .total{border-top:1.5px solid var(--text);padding-top:10px;margin-top:2px}.steps .total .amt{color:var(--teal);font-weight:600}
 .dots span{display:inline-block;width:7px;height:7px;margin-right:4px;border-radius:50%;background:var(--faint);animation:b 1.2s infinite both}
 .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}@keyframes b{0%,80%,100%{opacity:.25}40%{opacity:1}}
 .composer{flex:none;padding:12px 22px 20px;border-top:1px solid var(--line)}
 .chiprow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
 .chip{font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:7px 13px;cursor:pointer}
 .chip:hover{border-color:var(--teal);color:var(--teal)}
 form{display:flex;gap:10px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:7px 7px 7px 18px}
 form:focus-within{border-color:var(--teal)}form input{flex:1;border:0;background:transparent;font-size:15.5px}form input:focus{outline:none}
 form button{border:0;background:var(--teal);color:#fff;width:40px;height:40px;border-radius:10px;cursor:pointer;font-size:17px}
 .fade{animation:f .3s ease both}@keyframes f{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
</style></head><body>
<div class="app">
 <div class="bar"><div class="logo"><span class="mark"></span><span><span class="word">Kha</span> <span class="pb">import duty, <b>computed &amp; proven</b></span></span></div>
  <a class="nav" href="/compare">Compare with a general AI →</a></div>
 <div class="thread" id="thread"><div class="empty" id="empty">
   <h1>Import duty, computed exactly.</h1>
   <p>Give the HSN code, the item's value, and the IGST rate. The official Basic Customs Duty is applied and the duty computed, the same figure every time.</p>
   <div class="starters" id="starters"></div></div></div>
 <div class="composer"><div class="chiprow" id="chiprow"></div>
  <form id="form"><input id="q" autocomplete="off" placeholder="Message Kha…"><button id="go" type="submit">↑</button></form></div>
</div>
<script>
const PRESETS=[
 ["Cashew in shell · 08013100","importing cashew nuts in shell, HSN 08013100, assessable value 10 lakh, IGST 5%"]
 ["Motor car · 87032391","importing a motor car, HSN 87032391, assessable value 20 lakh, IGST 28%"]
 ["Personal computer · 84713010","importing a personal computer, HSN 84713010, value 80000, IGST 18%"]];
const inr=n=>Number(n).toLocaleString('en-IN'),$=id=>document.getElementById(id),thread=$('thread'),history=[];
PRESETS.forEach(([l,t])=>{const s=document.createElement('button');s.className='starter';s.innerHTML='Ask Kha<span>'+l+'</span>';s.onclick=()=>send(t);$('starters').appendChild(s);
 const c=document.createElement('button');c.className='chip';c.textContent=l;c.onclick=()=>send(t);$('chiprow').appendChild(c);});
const scroll=()=>thread.scrollTop=thread.scrollHeight;
function addUser(t){$('empty')?.remove();const m=document.createElement('div');m.className='msg user fade';m.innerHTML='<div class="bub"></div>';m.querySelector('.bub').textContent=t;thread.appendChild(m);scroll();}
function addBot(){const m=document.createElement('div');m.className='msg bot fade';m.innerHTML='<div class="av">ख</div><div class="content"><div class="dots"><span></span><span></span><span></span></div></div>';thread.appendChild(m);scroll();return m.querySelector('.content');}
function work(steps){const rows=steps.map(s=>'<li class="'+(s.total?'total':'')+'"><div><span class="h">'+s.head+'</span>'+(s.detail?'<div class="d">'+s.detail+'</div>':'')+'</div><span class="amt">₹'+inr(s.amount)+'</span></li>').join('');
 return '<div class="work fade"><p class="wl">How this figure is built</p><ul class="steps">'+rows+'</ul></div>';}
async function send(text){text=(text||$('q').value).trim();if(!text)return;$('q').value='';$('go').disabled=true;
 addUser(text);history.push({role:'user',content:text});const content=addBot();
 try{const d=await(await fetch('/api/chat',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({messages:history})})).json();
  history.push({role:'assistant',content:d.reply||''});let h='<p class="reply">'+(d.reply||'')+'</p>';
  if(d.value!=null){h+='<div class="amtcard fade"><div class="lbl">Total import duty payable</div><div class="amt"><span class="r">₹</span>'+inr(d.value)+'</div>'+
   '<button class="why" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">show the breakdown ▾</button><div style="display:none">'+work(d.steps||[])+'</div></div>';}
  content.innerHTML=h;scroll();
 }catch(e){content.innerHTML='<p class="reply">Could not reach the assistant ('+e+').</p>';}
 finally{$('go').disabled=false;$('q').focus();}}
$('form').addEventListener('submit',e=>{e.preventDefault();send();});
</script></body></html>
